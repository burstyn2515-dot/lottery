<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lottery DApp - 4 Games</title>
</head>

<body>

<h1>Lottery DApp - 4 Games</h1>

<div id="walletStatus">Wallet: Not connected</div>
<button onclick="connectWallet()">Connect Wallet</button>

<script>
async function connectWallet() {
    try {

        // Проверяем установлен ли MultiversX DeFi Wallet
        if (!window.multiversx) {
            alert("MultiversX DeFi Wallet not installed!");
            return;
        }

        // Запрашиваем доступ к аккаунтам
        const accounts = await window.multiversx.request({
            method: "connect"
        });

        console.log("Connected accounts:", accounts);

        if (accounts && accounts.length > 0) {
            document.getElementById("walletStatus").innerText =
                "Wallet connected: " + accounts[0];
        }

    } catch (error) {
        console.error("Connection error:", error);
    }
}
</script>

</body>
</html>
